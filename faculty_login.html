<!DOCTYPE html>
<html>
<head>
<title>Faculty Login | Presidency College</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
                url("https://images.unsplash.com/photo-1503676260728-1c00da094a0b");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

.header {
    background: rgba(8,25,52,0.95);
    color: white;
    padding: 18px;
    text-align: center;
    font-size: 22px;
    letter-spacing: 1px;
}

.container {
    width: 380px;
    margin: 120px auto;
    background: white;
    padding: 35px;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    text-align: center;
}

h2 {
    color: #1e3c72;
    margin-bottom: 20px;
}

input {
    width: 95%;
    padding: 12px;
    margin: 12px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    background: #0b1e3d;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #071529;
}

.forgot {
    margin-top: 10px;
    font-size: 13px;
}

.forgot a {
    text-decoration: none;
    color: #1e3c72;
}

.footer {
    text-align: center;
    margin-top: 20px;
    color: white;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="header">
    Presidency College of Engineering - Faculty Portal
</div>

<div class="container">
    <h2>Faculty Login</h2>

    <form method="POST">
        <input type="text" name="faculty_id" placeholder="Enter Faculty ID" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="forgot">
        <a href="#">Forgot Password?</a>
    </div>
</div>

<div class="footer">
    © 2026 Dolphin's College | Authorized Faculty Access Only
</div>

</body>
</html>
