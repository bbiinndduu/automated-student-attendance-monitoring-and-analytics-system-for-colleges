<!DOCTYPE html>
<html>
<head>
<title>Presidency College Attendance Portal</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                url("https://images.unsplash.com/photo-1523580846011-d3a5bc25702b");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

.header {
    background: rgba(11,30,61,0.95);
    color: white;
    padding: 18px;
    text-align: center;
    font-size: 24px;
    letter-spacing: 1px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

.container {
    width: 380px;
    margin: 120px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    text-align: center;
}

h2 { margin-bottom: 20px; color: #1e3c72; }

input {
    width: 95%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    background: #1e3c72;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
}

button:hover { background: #162b52; }

.footer {
    text-align: center;
    margin-top: 20px;
    color: white;
    font-size: 13px;
}
</style>
</head>
<body>

<div class="header">
    Presidency College of Engineering  
    <div style="font-size:14px; margin-top:5px; letter-spacing:0.5px;">
        <em>Education is the key to unlocking your future</em>
    </div>
</div>


<div class="container">
    <h2>Student Login</h2>
    <form method="POST">
        <input type="text" name="student_id" placeholder="Enter Student ID" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>
</div>

<div class="footer">© 2026 Dolphin's College | Computer Science Department</div>

</body>
</html>
