<!DOCTYPE html>
<html>
<head>
<title>Attendance Management</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
}

.container {
    width: 85%;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    color: #1e3c72;
}

.info {
    margin-bottom: 20px;
    font-weight: bold;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border: 1px solid #ccc;
    text-align: center;
}

th {
    background: #1e3c72;
    color: white;
}

tr:nth-child(even) {
    background: #f2f2f2;
}

button {
    margin-top: 20px;
    padding: 8px 14px;
    background: #1e3c72;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #162b52;
}
</style>
</head>

<body>

<div class="container">

    <h2>Attendance Management</h2>

    <div class="info">
        Subject: {{ subject_name }}
    </div>

    <table>
        <tr>
            <th>Student ID</th>
            <th>Subject</th>
            <th>Date</th>
            <th>Time</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
        </tr>
        {% endfor %}

    </table>

    <div style="text-align:center;">
        <a href="/faculty_dashboard">
            <button>Back to Dashboard</button>
        </a>
    </div>

</div>

</body>
</html>
