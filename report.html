<!DOCTYPE html>
<html>
<head>
<title>Attendance Report</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #eef1f5;
}

.header {
    background: #1e3c72;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.container {
    width: 85%;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th, td {
    padding: 10px;
    border: 1px solid #ccc;
    text-align: center;
}

th {
    background: #1e3c72;
    color: white;
}

tr:nth-child(even) {
    background: #f2f2f2;
}

button {
    margin-top: 20px;
    padding: 8px 14px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}
</style>
</head>
<body>

<div class="header">Attendance Report</div>

<div class="container">
    <table>
        <tr>
            <th>Subject</th>
            <th>Total Classes</th>
            <th>Attended</th>
            <th>Percentage</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{row[0]}}</td>
            <td>{{row[1]}}</td>
            <td>{{row[2]}}</td>
            <td>{{row[3]}}%</td>
        </tr>
        {% endfor %}

    </table>

    <div style="text-align:center;">
        <a href="/dashboard"><button>⬅ Back to Dashboard</button></a>
    </div>
</div>

</body>
</html>
